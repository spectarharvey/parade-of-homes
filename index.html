<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCBIA Parade of Homes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
/* ============ DESIGN SYSTEM ============ */
:root{
  --navy:#0f2742; --navy-deep:#0a1c30; --navy-soft:#1b3a5c;
  --gold:#c9a24b; --gold-light:#e3c878; --gold-dark:#a8842f;
  --cream:#faf7f1; --bg:#f5f1e8; --paper:#ffffff;
  --ink:#1f2d3d; --muted:#6b7686; --line:#e7e0d2;
  --green:#2f7d5b; --red:#c0492f; --blue:#2d6cb5; --amber:#d99a2b;
  --shadow:0 10px 30px rgba(15,39,66,.08); --shadow-lg:0 24px 60px rgba(15,39,66,.16);
  --radius:14px; --radius-sm:9px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Montserrat',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Lora',Georgia,serif;font-weight:600;line-height:1.2;margin:0 0 .4em}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:.95rem}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.muted{color:var(--muted)}
.center{text-align:center}
.eyebrow{font-family:'Montserrat';font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:.72rem;color:var(--gold-dark)}
.serif{font-family:'Lora',serif}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;border:none;border-radius:50px;padding:.78rem 1.5rem;font-weight:700;font-size:.9rem;transition:.18s;letter-spacing:.02em}
.btn-gold{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--navy-deep);box-shadow:0 8px 22px rgba(201,162,75,.35)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(201,162,75,.45)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-deep)}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold-dark)}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.35)}
.btn-ghost:hover{background:rgba(255,255,255,.22)}
.btn-sm{padding:.5rem 1rem;font-size:.8rem}
.btn-block{width:100%;justify-content:center}

/* badges */
.badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:.3rem .7rem;border-radius:50px}
.badge-gold{background:rgba(201,162,75,.16);color:var(--gold-dark)}
.badge-navy{background:rgba(15,39,66,.1);color:var(--navy)}
.badge-green{background:rgba(47,125,91,.14);color:var(--green)}
.badge-red{background:rgba(192,73,47,.14);color:var(--red)}
.badge-amber{background:rgba(217,154,43,.16);color:var(--amber)}
.badge-blue{background:rgba(45,108,181,.14);color:var(--blue)}

/* cards */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:.2s}
.card-hover:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}

/* ============ HEADER / NAV ============ */
header.site{position:sticky;top:0;z-index:50;background:rgba(10,28,48,.96);backdrop-filter:blur(8px);border-bottom:1px solid rgba(201,162,75,.25)}
.nav{display:flex;align-items:center;gap:1.4rem;height:70px}
.brand{display:flex;align-items:center;gap:.7rem;color:#fff;margin-right:auto}
.brand .logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--gold-light),var(--gold));display:grid;place-items:center;color:var(--navy-deep);font-weight:800;font-size:1.1rem;font-family:'Lora'}
.brand b{font-family:'Lora';font-weight:600;font-size:1.12rem;letter-spacing:.01em;line-height:1}
.brand small{display:block;color:var(--gold-light);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;margin-top:2px;font-family:'Montserrat';font-weight:600}
.nav-links{display:flex;gap:.3rem;align-items:center}
.nav-links a{color:#d7e0ea;font-size:.84rem;font-weight:600;padding:.5rem .7rem;border-radius:8px;transition:.15s}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-links a.active{color:var(--gold-light);background:rgba(201,162,75,.12)}
.nav-toggle{display:none;background:none;border:none;color:#fff;font-size:1.5rem}
@media(max-width:1000px){
  .nav-links{position:fixed;top:70px;left:0;right:0;background:var(--navy-deep);flex-direction:column;align-items:stretch;padding:1rem;gap:.2rem;display:none;border-bottom:1px solid rgba(201,162,75,.25)}
  .nav-links.open{display:flex}
  .nav-links a{padding:.8rem 1rem}
  .nav-toggle{display:block}
}

/* footer */
footer.site{background:var(--navy-deep);color:#c2cdd9;padding:3rem 0 1.6rem;margin-top:4rem}
footer.site .cols{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:2rem}
footer.site h4{color:#fff;font-size:1rem}
footer.site a{display:block;color:#9fb0c2;font-size:.85rem;padding:.2rem 0}
footer.site a:hover{color:var(--gold-light)}
footer.site .fbrand{display:flex;gap:.7rem;align-items:center;color:#fff;margin-bottom:.8rem}
footer.site .bottom{border-top:1px solid rgba(255,255,255,.1);margin-top:2rem;padding-top:1.3rem;font-size:.78rem;color:#7e8efa;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
@media(max-width:760px){footer.site .cols{grid-template-columns:1fr;gap:1.3rem}}

/* ============ HERO ============ */
.hero{position:relative;background:linear-gradient(160deg,var(--navy-deep),var(--navy) 55%,var(--navy-soft));color:#fff;overflow:hidden}
.hero:before{content:"";position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1600&q=70') center/cover;opacity:.22;mix-blend-mode:luminosity}
.hero .wrap{position:relative;padding:5rem 22px 5.5rem;text-align:center}
.hero h1{font-size:clamp(2.3rem,5vw,3.7rem);color:#fff;margin-bottom:.3em}
.hero h1 .gold{color:var(--gold-light)}
.hero p.lede{font-size:1.12rem;color:#d8e2ec;max-width:640px;margin:0 auto 2rem}
.hero .cta-row{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap}
.hero-dates{display:inline-flex;align-items:center;gap:.6rem;background:rgba(201,162,75,.16);border:1px solid rgba(201,162,75,.4);color:var(--gold-light);padding:.45rem 1rem;border-radius:50px;font-size:.82rem;font-weight:600;margin-bottom:1.4rem}

/* live stats bar */
.statsbar{background:var(--navy-deep);border-top:1px solid rgba(201,162,75,.2)}
.statsbar .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(201,162,75,.18)}
.statsbar .stat{background:var(--navy-deep);padding:1.4rem 1rem;text-align:center}
.statsbar .num{font-family:'Lora';font-size:2rem;color:var(--gold-light);font-weight:600;line-height:1}
.statsbar .lbl{color:#9fb0c2;font-size:.74rem;text-transform:uppercase;letter-spacing:.14em;margin-top:.4rem;font-weight:600}
@media(max-width:700px){.statsbar .grid{grid-template-columns:repeat(2,1fr)}}

/* sections */
section.block{padding:3.6rem 0}
.sec-head{text-align:center;max-width:640px;margin:0 auto 2.4rem}
.sec-head h2{font-size:clamp(1.7rem,3.5vw,2.4rem)}
.sec-head p{color:var(--muted)}
.sec-head.left{text-align:left;margin-left:0}
.row-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.6rem;gap:1rem;flex-wrap:wrap}

/* grids */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.3rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem}
@media(max-width:980px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

/* home card */
.home-card .photo{aspect-ratio:4/3;background:linear-gradient(135deg,#dfe5ec,#c6d0db);position:relative;overflow:hidden}
.home-card .photo img{width:100%;height:100%;object-fit:cover}
.home-card .photo .tag{position:absolute;top:.7rem;left:.7rem;background:rgba(10,28,48,.85);color:#fff;font-size:.68rem;font-weight:700;padding:.3rem .65rem;border-radius:50px;text-transform:uppercase;letter-spacing:.05em}
.home-card .photo .fav{position:absolute;top:.7rem;right:.7rem;background:rgba(255,255,255,.92);border:none;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:1rem}
.home-card .body{padding:1.1rem 1.2rem 1.3rem}
.home-card .price{font-family:'Lora';font-size:1.35rem;color:var(--navy);font-weight:600}
.home-card h3{font-size:1.05rem;margin:.2rem 0 .1rem}
.home-card .by{color:var(--muted);font-size:.8rem}
.home-card .specs{display:flex;gap:1rem;margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--line);color:var(--ink);font-size:.82rem;font-weight:600}
.home-card .specs span{display:flex;align-items:center;gap:.3rem}
.stars{color:var(--gold);letter-spacing:1px}

/* featured builder */
.featured-builder{display:grid;grid-template-columns:1.1fr 1fr;gap:0;border-radius:var(--radius);overflow:hidden;background:var(--navy);color:#fff;box-shadow:var(--shadow-lg)}
.featured-builder .left{padding:2.6rem}
.featured-builder .blogo{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,var(--gold-light),var(--gold));display:grid;place-items:center;color:var(--navy-deep);font-weight:800;font-size:1.5rem;font-family:'Lora';margin-bottom:1.1rem}
.featured-builder h3{color:#fff;font-size:1.7rem}
.featured-builder p{color:#c2cdd9;font-size:.92rem}
.featured-builder .adbox{background:rgba(201,162,75,.12);border:1px dashed rgba(201,162,75,.5);border-radius:10px;padding:1rem;margin:1.2rem 0;font-size:.85rem;color:var(--gold-light);font-style:italic}
.featured-builder .right{background:url('https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=900&q=70') center/cover;min-height:340px}

/* contest CTA */
.contest-cta{background:linear-gradient(135deg,var(--gold-dark),var(--gold));border-radius:var(--radius);padding:2.6rem;color:var(--navy-deep);display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;box-shadow:var(--shadow-lg)}
.contest-cta h2{color:var(--navy-deep);font-size:1.9rem}
.contest-cta p{color:#3a2e12;font-weight:500}
@media(max-width:760px){.contest-cta,.featured-builder{grid-template-columns:1fr}.featured-builder .right{min-height:200px}}

/* neighborhood card */
.nb-card{position:relative;border-radius:var(--radius);overflow:hidden;min-height:240px;display:flex;align-items:flex-end;color:#fff;box-shadow:var(--shadow)}
.nb-card .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:.4s}
.nb-card:hover .bg{transform:scale(1.06)}
.nb-card:after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(10,28,48,.92),rgba(10,28,48,.1))}
.nb-card .nb-body{position:relative;padding:1.3rem 1.4rem;width:100%}
.nb-card h3{color:#fff;margin-bottom:.1rem;font-size:1.3rem}
.nb-card .nb-meta{color:#d8e2ec;font-size:.82rem;display:flex;justify-content:space-between;align-items:center;margin-top:.5rem}
.nb-card .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:.4rem;vertical-align:middle}

/* sponsor bar */
.sponsor-bar{background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:1.8rem 0}
.sponsor-logos{display:flex;flex-wrap:wrap;gap:1.4rem;justify-content:center;align-items:center}
.sponsor-chip{display:flex;align-items:center;gap:.6rem;padding:.6rem 1.1rem;border:1px solid var(--line);border-radius:10px;background:var(--cream);font-weight:700;color:var(--navy);font-size:.9rem}

/* filters */
.toolbar{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:var(--shadow);display:flex;gap:.8rem;flex-wrap:wrap;align-items:center;margin-bottom:1.8rem}
.toolbar input[type=search],.toolbar select{border:1px solid var(--line);border-radius:9px;padding:.6rem .8rem;background:var(--cream);color:var(--ink)}
.toolbar input[type=search]{flex:1;min-width:200px}
.field-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-right:.2rem}

/* generic form */
.form-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.form-grid .full{grid-column:1/-1}
.fld{display:flex;flex-direction:column;gap:.35rem}
.fld label{font-size:.78rem;font-weight:700;color:var(--ink)}
.fld input,.fld select,.fld textarea{border:1px solid var(--line);border-radius:9px;padding:.65rem .8rem;background:var(--cream);width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.check{display:flex;gap:.6rem;align-items:flex-start;font-size:.86rem}
.check input{margin-top:.2rem}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}

/* breadcrumb */
.crumb{font-size:.82rem;color:var(--muted);padding:1.3rem 0 .2rem}
.crumb a:hover{color:var(--gold-dark)}

/* detail */
.gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;border-radius:var(--radius);overflow:hidden;height:420px}
.gallery .g0{grid-row:1/3}
.gallery div{background-size:cover;background-position:center;background-color:#cbd5e1}
@media(max-width:760px){.gallery{height:auto;grid-template-columns:1fr 1fr}.gallery .g0{grid-row:auto;grid-column:1/3;height:240px}.gallery div:not(.g0){height:120px}}
.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin:1.5rem 0}
.spec-grid .sp{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:1rem;text-align:center}
.spec-grid .sp .v{font-family:'Lora';font-size:1.4rem;color:var(--navy);font-weight:600}
.spec-grid .sp .k{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:.2rem}
.feature-list{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
.feature-list li{list-style:none;display:flex;gap:.5rem;align-items:center;font-size:.9rem}
.feature-list li:before{content:"✓";color:var(--gold-dark);font-weight:800}
.detail-layout{display:grid;grid-template-columns:1fr 320px;gap:2rem;align-items:start}
@media(max-width:900px){.detail-layout{grid-template-columns:1fr}.spec-grid{grid-template-columns:repeat(2,1fr)}}
.side-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem;position:sticky;top:90px}

/* QR */
.qr{width:150px;height:150px;border-radius:12px;border:1px solid var(--line);background:#fff;padding:8px}
.qr svg{width:100%;height:100%}

/* map */
.map-layout{display:grid;grid-template-columns:300px 1fr;gap:0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--paper);min-height:560px}
.map-side{padding:1.2rem;border-right:1px solid var(--line);overflow:auto;max-height:640px}
.map-canvas{position:relative;background:linear-gradient(135deg,#e8eef4,#d6e0ea);overflow:hidden}
.map-canvas .roads{position:absolute;inset:0;opacity:.5}
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;text-align:center;transition:.15s;z-index:2}
.pin:hover{transform:translate(-50%,-100%) scale(1.12);z-index:5}
.pin .dot{width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 4px 10px rgba(0,0,0,.3);display:grid;place-items:center;border:2px solid #fff}
.pin .dot span{transform:rotate(45deg);color:#fff;font-weight:800;font-size:.8rem}
.map-pop{position:absolute;z-index:10;background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);width:230px;overflow:hidden;border:1px solid var(--line)}
.map-pop img{height:110px;width:100%;object-fit:cover}
.route-stop{display:flex;gap:.8rem;align-items:center;padding:.7rem;border:1px solid var(--line);border-radius:10px;margin-bottom:.6rem;background:var(--cream)}
.route-num{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.85rem;flex-shrink:0}
@media(max-width:820px){.map-layout{grid-template-columns:1fr}.map-side{max-height:none;border-right:none;border-bottom:1px solid var(--line)}.map-canvas{min-height:420px}}

/* contest stamp card */
.stamp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem}
.stamp{aspect-ratio:1;border-radius:14px;border:2px dashed var(--line);display:grid;place-items:center;text-align:center;background:var(--cream);position:relative}
.stamp.done{border-style:solid;border-color:var(--gold);background:linear-gradient(135deg,#fff,#fbf3df)}
.stamp.done .ck{font-size:1.6rem}
.stamp .n{font-size:.7rem;color:var(--muted);position:absolute;bottom:6px}
.progress-ring{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.pbar{height:14px;border-radius:50px;background:var(--line);overflow:hidden;flex:1;min-width:200px}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:50px}
@media(max-width:640px){.stamp-grid{grid-template-columns:repeat(3,1fr)}}

/* accordion */
.acc{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper);margin-bottom:.8rem;box-shadow:var(--shadow)}
.acc summary{padding:1.1rem 1.3rem;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;list-style:none;font-size:1rem}
.acc summary::-webkit-details-marker{display:none}
.acc summary .ic{transition:.2s;color:var(--gold-dark);font-size:1.3rem}
.acc[open] summary .ic{transform:rotate(45deg)}
.acc .ans{padding:0 1.3rem 1.2rem;color:var(--muted)}

/* sponsor tiers */
.tier{margin-bottom:2.6rem}
.tier-head{text-align:center;margin-bottom:1.4rem}
.tier-head .ribbon{display:inline-block;padding:.4rem 1.4rem;border-radius:50px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;font-size:.8rem}
.tier-platinum .ribbon{background:linear-gradient(135deg,#dfe6ee,#b9c6d6);color:#3a4a5c}
.tier-gold .ribbon{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--navy-deep)}
.tier-silver .ribbon{background:linear-gradient(135deg,#e9edf1,#cfd6dd);color:#5a6573}
.sponsor-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:1.6rem;text-align:center}
.sponsor-card .slogo{width:70px;height:70px;border-radius:14px;margin:0 auto .8rem;display:grid;place-items:center;font-family:'Lora';font-weight:700;font-size:1.6rem;color:#fff}
.tier-platinum .grid-3 .sponsor-card{padding:2.2rem}

/* ============ ADMIN ============ */
.admin-shell{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 70px)}
.admin-side{background:var(--navy-deep);color:#c2cdd9;padding:1.4rem 1rem}
.admin-side .alogo{color:#fff;font-family:'Lora';font-weight:600;font-size:1.1rem;padding:.4rem .6rem 1.2rem;display:flex;gap:.5rem;align-items:center}
.admin-side a{display:flex;align-items:center;gap:.65rem;padding:.7rem .8rem;border-radius:9px;color:#9fb0c2;font-size:.86rem;font-weight:600;margin-bottom:.2rem}
.admin-side a:hover{background:rgba(255,255,255,.07);color:#fff}
.admin-side a.active{background:rgba(201,162,75,.18);color:var(--gold-light)}
.admin-main{padding:2rem;background:var(--bg);overflow:auto}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:1.3rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .kic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:1.2rem;margin-bottom:.7rem}
.kpi .kv{font-family:'Lora';font-size:2rem;color:var(--navy);font-weight:600;line-height:1}
.kpi .kl{color:var(--muted);font-size:.8rem;font-weight:600;margin-top:.2rem}
.kpi .kd{font-size:.74rem;font-weight:700;margin-top:.5rem}

/* deterministic pseudo-QR (decorative, not scannable) */
function qrSVG(seed){
  let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))>>>0;
  const N=11,rnd=()=>{h=(h*1103515245+12345)>>>0;return (h>>>16)/65535;};
  let cells='';
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const corner=(x<3&&y<3)||(x>N-4&&y<3)||(x<3&&y>N-4);
    if(corner|| rnd()>.5) cells+=`<rect x="${x}" y="${y}" width="1" height="1"/>`;
  }
  // finder squares
  const finder=(fx,fy)=>`<rect x="${fx}" y="${fy}" width="3" height="3" fill="#0a1c30"/><rect x="${fx+1}" y="${fy+1}" width="1" height="1" fill="#fff"/>`;
  return `<svg viewBox="-0.5 -0.5 ${N+1} ${N+1}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"><rect x="-0.5" y="-0.5" width="${N+1}" height="${N+1}" fill="#fff"/><g fill="#0a1c30">${cells}</g>${finder(0,0)}${finder(N-3,0)}${finder(0,N-3)}</svg>`;
}

function bindHomeFilters(){
  const q=$('#f-q'),fb=$('#f-builder'),fn=$('#f-nb'),fs=$('#f-style'),so=$('#f-sort');
  function render(){
    let list=DB.homes.slice();
    const term=(q.value||'').toLowerCase();
    if(term)list=list.filter(h=>(h.name+' '+builder(h.builder).name+' '+h.style+' '+nbhd(h.nb).name).toLowerCase().includes(term));
    if(fb.value)list=list.filter(h=>h.builder===fb.value);
    if(fn.value)list=list.filter(h=>h.nb===fn.value);
    if(fs.value)list=list.filter(h=>h.style===fs.value);
    const sort=so.value;
    list.sort((a,b)=>sort==='price-asc'?a.price-b.price:sort==='price-desc'?b.price-a.price:sort==='rating'?b.rating-a.rating:sort==='checkins'?b.checkins-a.checkins:sort==='sqft'?b.sqft-a.sqft:(b.featured-a.featured));
    $('#result-count').textContent=`Showing ${list.length} home${list.length!==1?'s':''}`;
    $('#home-results').innerHTML=list.length?list.map(homeCardHTML).join(''):'<div class="empty" style="grid-column:1/-1">No homes match your filters. Try clearing them.</div>';
  }
  [q,fb,fn,fs,so].forEach(e=>e.addEventListener('input',render));
  render();
}

function bindMap(){
  let routeMode=false;
  const canvas=$('#map-canvas');
  const btn=$('#route-mode');
  function refreshPins(){
    document.querySelectorAll('.pin').forEach(p=>{
      const id=p.dataset.id, idx=SESS.route.indexOf(id);
      const dotSpan=p.querySelector('.dot span');
      const h=home(id);
      dotSpan.textContent = (routeMode&&idx>=0)?(idx+1):h.beds;
      p.querySelector('.dot').style.outline = (routeMode&&idx>=0)?'3px solid var(--gold)':'none';
    });
  }
  function renderRouteList(){
    const list=$('#route-list');
    if(!SESS.route.length){list.innerHTML='<div class="empty" style="padding:1.2rem;font-size:.84rem">No stops yet.</div>';return;}
    list.innerHTML=SESS.route.map((id,i)=>{const h=home(id);return `<div class="route-stop"><span class="route-num">${i+1}</span><div style="flex:1"><b style="font-size:.85rem">${h.name}</b><div class="muted" style="font-size:.76rem">${nbhd(h.nb).name} · ${money(h.price)}</div></div><button class="ico-btn danger" data-rm="${id}">✕</button></div>`;}).join('');
    list.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{SESS.route=SESS.route.filter(x=>x!==b.dataset.rm);renderRouteList();refreshPins();}));
  }
  btn.addEventListener('click',()=>{
    routeMode=!routeMode;
    btn.textContent=routeMode?'✓ Route Mode On':'🧭 Plan My Route';
    btn.classList.toggle('btn-navy',routeMode);btn.classList.toggle('btn-gold',!routeMode);
    $('#side-default').style.display=routeMode?'none':'block';
    $('#side-route').style.display=routeMode?'block':'none';
    if(routeMode)renderRouteList();
    refreshPins();
  });
  $('#clear-route').addEventListener('click',()=>{SESS.route=[];renderRouteList();refreshPins();toast('Route cleared');});
  function closePop(){document.querySelector('.map-pop')?.remove();}
  document.querySelectorAll('.pin').forEach(p=>{
    p.addEventListener('click',e=>{
      e.stopPropagation();
      const id=p.dataset.id, h=home(id);
      if(routeMode){
        let r=SESS.route; if(r.includes(id))r=r.filter(x=>x!==id);else r.push(id); SESS.route=r; renderRouteList(); refreshPins();
        return;
      }
      closePop();
      const pop=el('div',{class:'map-pop',onclick:ev=>ev.stopPropagation()});
      pop.innerHTML=`<img src="${homePhoto(h)}" alt=""><div style="padding:.7rem .8rem"><b style="font-size:.9rem">${h.name}</b><div class="muted" style="font-size:.76rem">${nbhd(h.nb).name} · ${money(h.price)}</div><div style="font-size:.76rem;margin:.3rem 0"><span class="stars">${stars(h.rating)}</span> ${h.rating}</div><a href="#/home/${h.id}" class="btn btn-navy btn-sm btn-block">View Home →</a></div>`;
      let left=h.x, top=h.y;
      pop.style.left=Math.min(left,72)+'%'; pop.style.top=Math.max(top-2,2)+'%';
      pop.style.transform='translate(-50%,-100%)';
      canvas.appendChild(pop);
    });
  });

  refreshPins();
}

    <td><b style="font-size:.86rem">${u.first} ${u.last}</b><div class="muted" style="font-size:.74rem">Joined ${u.date}</div></td>
    <td>${u.email}<div class="muted" style="font-size:.74rem">${u.phone||'—'}</div></td><td>${u.zip}</td>
    <td><b>${u.checkins}</b> <span class="muted">/ ${target}</span></td>
    <td>${entered?'<span class="badge badge-green">✓ Entered</span>':'<span class="badge badge-amber">In progress</span>'}</td>
    <td>${u.sms?'<span class="badge badge-blue">✓ Opted In</span>':'<span class="badge badge-red">Opted Out</span>'}</td></tr>`;}).join('');
  return adminShell('#/admin/users',`<h1 style="font-size:1.7rem">Registered Users</h1><p class="muted" style="margin-top:-.4rem">${DB.users.length} registered · ${DB.users.filter(u=>u.sms).length} SMS opt-ins · ${DB.users.filter(u=>u.checkins>=target).length} contest entrants</p>
    <div class="tbl-wrap" style="margin-top:1.2rem"><table class="data"><thead><tr><th>Name</th><th>Contact</th><th>ZIP</th><th>Check-Ins</th><th>Contest</th><th>SMS Opt-In</th></tr></thead><tbody>${rows}</tbody></table></div>`);
});}

function adminSubmissions(){return requireAdmin(()=>{
  const rows=DB.submissions.map(s=>`<tr>
    <td><b style="font-size:.86rem">${s.home}</b><div class="muted" style="font-size:.74rem">${s.nb} · ${s.style}</div></td>
    <td>${s.builder}<div class="muted" style="font-size:.74rem">${s.contact}</div></td>
    <td>${money(s.price)}</td><td>${s.beds}bd / ${s.baths}ba · ${s.sqft.toLocaleString('en-US')}sf</td><td class="muted">${s.date}</td>
    <td>${s.status==='pending'?'<span class="badge badge-amber">Pending</span>':s.status==='approved'?'<span class="badge badge-green">Approved</span>':'<span class="badge badge-red">Rejected</span>'}</td>
    <td>${s.status==='pending'?`<div class="pill-row"><button class="ico-btn" data-approve="${s.id}">Approve</button><button class="ico-btn danger" data-reject="${s.id}">Reject</button></div>`:'<span class="muted" style="font-size:.78rem">Reviewed</span>'}</td></tr>`).join('');
  setTimeout(()=>{
    document.querySelectorAll('[data-approve]').forEach(b=>b.addEventListener('click',()=>{const s=DB.submissions.find(x=>x.id===b.dataset.approve);s.status='approved';save();toast('✓ Submission approved & published');render();}));
    document.querySelectorAll('[data-reject]').forEach(b=>b.addEventListener('click',()=>{const s=DB.submissions.find(x=>x.id===b.dataset.reject);s.status='rejected';save();toast('Submission rejected');render();}));
  },0);
  const pending=DB.submissions.filter(s=>s.status==='pending').length;
  return adminShell('#/admin/submissions',`<h1 style="font-size:1.7rem">Builder Submissions</h1><p class="muted" style="margin-top:-.4rem">${pending} awaiting review · ${DB.submissions.length} total</p>
    <div class="tbl-wrap" style="margin-top:1.2rem"><table class="data"><thead><tr><th>Home</th><th>Builder</th><th>Price</th><th>Specs</th><th>Submitted</th><th>Status</th><th>Review</th></tr></thead><tbody>${rows}</tbody></table></div>`);
});}

function adminNotifications(){return requireAdmin(()=>{
  const optin=DB.users.filter(u=>u.sms).length;
  setTimeout(()=>{
    $('#notif-form')?.addEventListener('submit',e=>{
      e.preventDefault();const f=e.target;
      DB.notifications.unshift({id:'nt'+Date.now(),type:f.type.value,msg:f.msg.value,audience:f.audience.value,sent:'2026-06-17 '+ '12:00',count:f.audience.value.includes('opted')?optin:Math.round(optin*.7)});
      save();f.reset();toast('🔔 Notification sent to '+optin+' users');render();
    });
  },0);
  return adminShell('#/admin/notifications',`<h1 style="font-size:1.7rem">Notifications</h1><p class="muted" style="margin-top:-.4rem">Send announcements, contest updates, and reminders to your ${optin} opted-in users.</p>
    <div class="grid-2" style="align-items:start;margin-top:1.2rem">
      <div class="panel"><h3>Compose Message</h3>
        <form id="notif-form"><div class="fld" style="margin-bottom:.8rem"><label>Type</label><select name="type"><option>Announcement</option><option>Contest Update</option><option>Reminder</option></select></div>
        <div class="fld" style="margin-bottom:.8rem"><label>Audience</label><select name="audience"><option>All opted-in users</option><option>Active visitors</option><option>Contest entrants</option></select></div>
        <div class="fld" style="margin-bottom:.8rem"><label>Message</label><textarea name="msg" rows="4" required placeholder="Type your message…"></textarea></div>
        <button class="btn btn-gold btn-block" type="submit">🔔 Send Notification</button></form>
      </div>
      <div class="panel"><h3>Notification History</h3>
        ${DB.notifications.map(n=>`<div style="padding:.8rem 0;border-bottom:1px solid var(--line)"><div style="display:flex;justify-content:space-between;align-items:center"><span class="badge badge-blue">${n.type}</span><span class="muted" style="font-size:.74rem">${n.sent}</span></div><p style="font-size:.86rem;margin:.4rem 0 .2rem">${n.msg}</p><span class="muted" style="font-size:.74rem">📤 ${n.count} recipients · ${n.audience}</span></div>`).join('')}
      </div>
    </div>`);
});}

function adminSettings(){return requireAdmin(()=>{
  setTimeout(()=>{
    $('#settings-form')?.addEventListener('submit',e=>{
      e.preventDefault();const f=e.target;
      DB.contest.target=+f.target.value;DB.contest.prize=f.prize.value;save();toast('✓ Contest settings saved');render();
    });
    $('#reset-data')?.addEventListener('click',()=>{if(confirm('Reset ALL data back to the original demo seed? This clears edits, submissions, and registrations.')){resetDB();toast('Data reset to defaults');render();}});
  },0);
  return adminShell('#/admin/settings',`<h1 style="font-size:1.7rem">Contest Settings</h1><p class="muted" style="margin-top:-.4rem">Configure the giveaway target and prize description shown across the app.</p>
    <div class="panel" style="margin-top:1.2rem;max-width:620px">
      <form id="settings-form">
        <div class="fld" style="margin-bottom:1rem"><label>Target Number of Homes to Visit</label><input name="target" type="number" min="1" max="20" value="${DB.contest.target}"><p class="muted" style="font-size:.76rem;margin:.3rem 0 0">Guests must check in at this many homes to be entered to win.</p></div>
        <div class="fld" style="margin-bottom:1rem"><label>Prize Description</label><textarea name="prize" rows="3">${DB.contest.prize}</textarea></div>
        <button class="btn btn-gold" type="submit">Save Settings</button>
      </form>
      <hr class="soft">
      <h3 style="font-size:1rem">Danger Zone</h3><p class="muted" style="font-size:.84rem">Restore all demo data to its original state.</p>
      <button id="reset-data" class="btn btn-outline btn-sm">↺ Reset Demo Data</button>
    </div>`);
});}

function notFound(){return shell('',`<div class="wrap"><div class="empty" style="padding:5rem"><div style="font-size:3rem">🏚️</div><h2>Page not found</h2><p class="muted">We couldn't find what you were looking for.</p><a href="#/" class="btn btn-gold">Back to Home</a></div></div>`);}

/* ============================================================
   ROUTER
   ============================================================ */
const routes={
  '':pageHome,'/':pageHome,'/homes':pageHomes,'/neighborhoods':pageNeighborhoods,
  '/builders':pageBuilders,'/map':pageMap,'/contest':pageContest,'/register':pageRegister,
  '/sponsors':pageSponsors,'/faq':pageFAQ,'/submit':pageSubmit,
  '/admin':adminDashboard,'/admin/homes':adminHomes,'/admin/builders':adminBuilders,
  '/admin/users':adminUsers,'/admin/submissions':adminSubmissions,'/admin/notifications':adminNotifications,'/admin/settings':adminSettings,
};
function render(){
  const hash=location.hash.replace(/^#/,'')||'/';
  const parts=hash.split('/').filter(Boolean);
  let html;
  if(parts[0]==='home'&&parts[1])html=pageHomeDetail(parts[1]);
  else if(parts[0]==='neighborhood'&&parts[1])html=pageNeighborhoodDetail(parts[1]);
  else if(routes[hash])html=routes[hash]();
  else if(routes['/'+parts.join('/')])html=routes['/'+parts.join('/')]();
  else html=notFound();
  $('#app').innerHTML=html;
  window.scrollTo(0,0);
  document.getElementById('navlinks')?.classList.remove('open');
}
window.addEventListener('hashchange',render);
window.render=render; // used by inline handlers
load();
render();
})();
</script>
</body>
</html>
